<nz-table
  #basicTable [nzData]="tableData"
  [nzFrontPagination]="false"
  [nzShowPagination]="false">
  <thead>
    <tr>
      <th>Chapas</th>
      <th>Editar de votos</th>
      <!--        <th>Votos</th>-->
    </tr>
  </thead>
  <tbody>
    @for (items of tableData; track items) {
      <tr style="position: relative;">
        <td>{{items.plate?.name}}</td>
        <td>
          <input type="text" maxlength=10 nz-input [(ngModel)]="items.quantity" style="width: 20%;" min="0"/>
        </td>
      </tr>
    }
  </tbody>
</nz-table>
<div *nzModalFooter>
  <nz-form-control>
    <button nz-button nzType="default" type="button" (click)="generateReportVoterResumePlate()">
      <span nz-icon nzType="file-pdf" nzTheme="outline"></span>
    </button>
    <button nz-button nzType="default" type="button" (click)="cancel()">Fechar</button>
    <button class="success" nz-button nzType="primary" type="submit"
      (click)="saveResumeVote()">
      <span nz-icon nzType="check" nzTheme="outline"></span>
      Salvar
    </button>
  </nz-form-control>
</div>
