<nz-layout class="layout">
  @if (hiddenMenu()) {
    <header class="shell-header">
      <div class="brand">
        <img src="../assets/images/logo-votup.svg" height="32" alt="VotUp">
        <span>VotUp</span>
      </div>
      @if (authService.isLoggedIn()) {
        <div class="user-area">
          <div class="user-copy">Olá, <strong>{{ authService.user.name }}</strong></div>
          <button nz-button nzType="text" class="logout-button" (click)="logout()">Sair</button>
        </div>
      }
    </header>
    <nav class="shell-nav" aria-label="Navegação principal">
      @for (item of navItems(); track item.path) {
        <a
          class="shell-nav-item"
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span nz-icon [nzType]="item.icon" nzTheme="outline"></span>
          <span class="shell-nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  }
  <nz-content>
    <router-outlet></router-outlet>
  </nz-content>
</nz-layout>
<audio id="audioElement" src="assets/audios/login-wellcome.mp3"></audio>
