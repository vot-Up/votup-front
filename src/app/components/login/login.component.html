<section class="login-page">
    <div class="auth-panel login-panel">
        <div class="auth-brand logo">
            <img src="../../../assets/images/logo-votup.svg" height="32" alt="VotUp">
            <span>VotUp</span>
        </div>
        <div class="auth-copy">
            <h1>Bem-vindo de volta</h1>
            <p>Acesse o painel administrativo para acompanhar usuários, chapas e etapas da eleição.</p>
        </div>

        <form nz-form class="auth-form login-form" [formGroup]="formGroup">
            <nz-form-item>
                <nz-form-control nzErrorTip="Por favor, digite seu email!">
                    <nz-input-group nzPrefixIcon="user">
                        <input type="email" nz-input formControlName="email" placeholder="Email administrativo" autocomplete="username"/>
                    </nz-input-group>
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-control nzErrorTip="Por favor, digite sua senha!">
                    <nz-input-group nzPrefixIcon="lock">
                        <input nz-input
                               placeholder="Senha"
                               type="password"
                               [type]="hide() ? 'password': 'text'"
                               formControlName="password"
                               minlength="4"
                               maxlength="64"
                               autocomplete="current-password"
                               required>
                    </nz-input-group>
                </nz-form-control>
            </nz-form-item>

            <div class="login-link">
                <a nz-button nzType="link" (click)="this.router.navigate(['reset-password']).then();">
                    Esqueceu sua senha?
                </a>
            </div>

            @if (test()) {
                <nz-alert nzType="warning" class="login-alert" nzMessage="Usuário não encontrado. Verifique o email e tente novamente." nzShowIcon></nz-alert>
            }

            <div class="auth-actions login-actions">
                <button nzBlock nz-button nzType="primary" class="submit-button" (click)="login()" [disabled]="!formGroup.valid">
                    Entrar
                </button>
            </div>
        </form>
    </div>
    <div class="auth-visual login-visual">
        <div class="auth-visual-panel">
            <img src="assets/images/login.svg" alt="Ilustração de login seguro">
        </div>
        <div class="auth-assurance">
            <strong>Ambiente administrativo verificado</strong>
            <span>Use credenciais autorizadas para operar dados sensíveis da eleição.</span>
        </div>
    </div>
</section>
