<div nz-row nzJustify="space-between" nzAlign="middle">
  <h2>Votação</h2>
  <button (click)="showModal()" nz-button nzType="primary">
    <span nz-icon nzType="plus" nzTheme="outline"></span>
    Criar votação
  </button>
</div>

<div class="inner-content">
  <form nz-form [formGroup]="formGroup" class="filter-form">
    <div nz-row nzGutter="16" class="filter-row">
      <div nz-col nzFlex="auto" class="filter-field">
        <nz-form-item>
          <input nz-input placeholder="Buscar votação" formControlName="description"/>
        </nz-form-item>
      </div>
      <div nz-col nzLg="4" nzXs="24" class="filter-field">
        <nz-date-picker nzPlaceHolder="Data inicial" formControlName="start_date"
          nzFormat="dd/MM/yyyy"></nz-date-picker>
      </div>
      <div nz-col nzLg="4" nzXs="24" class="filter-field">
        <nz-date-picker nzPlaceHolder="Data final" formControlName="final_date"
          nzFormat="dd/MM/yyyy"></nz-date-picker>
      </div>
      <div nz-col nzLg="3" nzXs="24" class="filter-field">
        <nz-select nzPlaceHolder="Status" formControlName="active">
          <nz-option nzValue="true" nzLabel="Ativo"></nz-option>
          <nz-option nzValue="false" nzLabel="Inativo"></nz-option>
          <nz-option nzValue="" nzLabel="Todos"></nz-option>
        </nz-select>
      </div>
      <div nz-col nzXs="24" nzLg="auto" class="filter-field filter-search-btn">
        <button type="button" (click)="search()" nz-button nzType="primary" nzBlock>
          <span nz-icon nzType="search" nzTheme="outline"></span>
        </button>
      </div>
    </div>
  </form>

  <nz-list class="expandable-list-container">
    @for (vote of tableData(); track vote.id) {
      <nz-list-item
        class="expandable-list-item"
        [class.expanded]="expandedIds().has(vote.id)"
        (click)="toggleExpand(vote.id)"
      >
        <div class="expandable-list-primary">{{ vote.description }}</div>
        <div class="expandable-list-status">
          <span class="status-badge" [class.status-active]="vote.active" [class.status-inactive]="!vote.active">
            {{ vote.active ? 'Ativo' : 'Inativo' }}
          </span>
        </div>
        <div class="expandable-list-chevron">
          <span nz-icon nzType="down" nzTheme="outline"></span>
        </div>
      </nz-list-item>

      <div class="expandable-list-expanded" [class.open]="expandedIds().has(vote.id)">
        <div class="expandable-list-fields">
          <div class="expandable-list-field">
            <span class="field-label">Data limite</span>
            <span class="field-value">{{ vote.date | date: "dd/MM/yyyy" }}</span>
          </div>
        </div>
        <div class="expandable-list-actions">
          <button class="action-btn" [disabled]="!vote.was_voted"
            (click)="vote.was_voted && showRanking(vote); $event.stopPropagation()">
            <span nz-icon nzType="line-chart"></span>
            Resultado
          </button>
          @if (authService.user.is_superuser) {
            <button class="action-btn" [disabled]="!vote.was_voted"
              (click)="vote.was_voted && showEditVote(vote); $event.stopPropagation()">
              <span nz-icon nzType="project"></span>
              Resumo
            </button>
          }
          <button class="action-btn" (click)="showModal(vote); $event.stopPropagation()">
            <span nz-icon nzType="edit"></span>
            Editar
          </button>
          @if (vote.active) {
            <button class="action-btn action-warn"
              (click)="showCloseVoteMessage(vote); $event.stopPropagation()">
              <span nz-icon nzType="stop"></span>
              Encerrar
            </button>
          } @else {
            <button class="action-btn action-success"
              (click)="activeVoteModal(vote); $event.stopPropagation()">
              <span nz-icon nzType="play-circle"></span>
              Ativar
            </button>
          }
          <button class="action-btn action-danger"
            (click)="showConfirmMessage(vote); $event.stopPropagation()">
            <span nz-icon nzType="delete"></span>
            Excluir
          </button>
        </div>
      </div>
    }
    @empty {
      <div class="no-data-message">
        <p>Nenhuma votação encontrada</p>
      </div>
    }
  </nz-list>

  <div class="pagination-wrapper">
    <nz-pagination
      [nzPageIndex]="paginator().nzPageIndex"
      [nzTotal]="pageLength()"
      (nzPageIndexChange)="search()"
      (nzPageSizeChange)="search()"
      nzShowSizeChanger
      [nzPageSize]="paginator().nzPageSize"
    ></nz-pagination>
  </div>
</div>
