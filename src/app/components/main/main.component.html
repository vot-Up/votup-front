<div nz-row class="main">
    <div nz-col class="left">
        <div class="logo">
            <img src="../../../assets/images/logo-votup.svg" height="32px" alt="">
            VotUp
        </div>
        <div nz-row [nzGutter]="[16, 16]">
            <div nz-col class="gutter-row" [nzSpan]="24">
                <span class="title">A solução para uma eleição de sucesso!</span>
            </div>
            <div nz-col class="gutter-row" [nzSpan]="24">
                <span class="subtitle">O que você deseja fazer?</span>
            </div>
            <div nz-col class="gutter-row" [nzSpan]="24">
                <nz-space nzSize="middle">
                    <button *nzSpaceItem nz-button class="blue"
                            (click)="this.router.navigate(['login']).then();">
                        Criar uma votação
                    </button>
                    <button *nzSpaceItem nz-button nzType="primary"
                            (click)="this.router.navigate(['login-elector']).then();">
                        Quero votar
                    </button>
                </nz-space>
            </div>
        </div>
    </div>
    <div nz-col class="right">
        <div class="image"><img src="./assets/images/main.svg" alt=""></div>
    </div>
</div>
