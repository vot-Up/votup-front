<section class="main-page">
  <div class="main-copy">
    <div class="logo">
      <img src="../../../assets/images/logo-votup.svg" height="32" alt="VotUp">
      <span>VotUp</span>
    </div>
    <div class="main-heading">
      <span class="eyebrow">Sistema de votação</span>
      <h1 class="title">Organize, acesse e vote com confiança.</h1>
      <p class="subtitle">Escolha o caminho certo para continuar. Eleitores entram pelo telefone cadastrado; administradores acessam pelo painel.</p>
    </div>
    <div class="actions">
      <button nz-button nzType="primary" class="primary-action" (click)="goToLoginElector()">
        Quero votar
      </button>
      <button nz-button class="secondary-action" (click)="goToCreateVote()">
        Criar uma votação
      </button>
      <button nz-button class="tertiary-action" (click)="goToRegister()">
        Cadastrar-se
      </button>
    </div>
    <div class="main-assurance">
      <span>Fluxo mobile-first</span>
      <span>Acesso verificado</span>
      <span>Gestão de chapas</span>
    </div>
  </div>
  <div class="main-visual">
    <div class="main-visual-panel">
      <img src="./assets/images/main.svg" alt="Ilustração de eleição">
    </div>
  </div>
</section>
