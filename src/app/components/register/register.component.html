<section class="register-page">
  <div class="auth-panel register-panel">
    <div class="auth-brand logo">
      <img src="../../../assets/images/logo-votup.svg" height="32" alt="VotUp">
      <span>VotUp</span>
    </div>
    <div class="auth-copy">
      <h1>Crie sua conta</h1>
      <p>Cadastre seus dados para participar da eleição como eleitor ou candidato.</p>
    </div>

    <form nz-form class="auth-form register-form" [formGroup]="formGroup">
      <nz-form-item>
        <nz-form-control>
          <nz-radio-group formControlName="role" class="role-toggle">
            <label nz-radio-button nzValue="ELEITOR">Eleitor</label>
            <label nz-radio-button nzValue="CANDIDATO">Candidato</label>
          </nz-radio-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="{{ fieldErrors()['name'] || 'Por favor, digite seu nome!' }}">
          <nz-input-group nzPrefixIcon="user">
            <input type="text" nz-input formControlName="name" placeholder="Nome completo" autocomplete="off"/>
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="{{ fieldErrors()['email'] || 'Por favor, digite um email válido!' }}">
          <nz-input-group nzPrefixIcon="mail">
            <input type="email" nz-input formControlName="email" placeholder="Email" autocomplete="email"/>
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="{{ fieldErrors()['cellphone'] || 'Número de telefone inválido!' }}">
          <nz-input-group nzPrefixIcon="phone">
            <input required nz-input type="text" formControlName="cellphone" maxlength="15" inputmode="tel" placeholder="(99) 99999-9999" [mask]="'(00) 00000-0000'" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="Por favor, digite sua senha!">
          <nz-input-group nzPrefixIcon="lock">
            <input nz-input placeholder="Senha" type="password" formControlName="password" minlength="4" maxlength="64" autocomplete="new-password" required>
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="{{ fieldErrors()['confirm_password'] || 'As senhas não conferem!' }}">
          <nz-input-group nzPrefixIcon="lock">
            <input nz-input placeholder="Confirmar senha" type="password" formControlName="confirmPassword" minlength="4" maxlength="64" autocomplete="new-password" required>
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      @if (errorMessage()) {
        <nz-alert nzType="error" class="register-alert" [nzMessage]="errorMessage()" nzShowIcon></nz-alert>
      }

      <div class="auth-actions actions">
        <button nzBlock nz-button nzType="primary" class="submit-button" type="button" (click)="submit()" [disabled]="!formGroup.valid || isSubmitting()">
          @if (isSubmitting()) {
            Cadastrando...
          } @else {
            Cadastrar
          }
        </button>
        <button nzBlock nz-button class="secondary-action" type="button" (click)="cancel()">
          Cancelar
        </button>
      </div>
    </form>

    <div class="register-link">
      Já tem uma conta? <a routerLink="/login">Faça login</a>
    </div>
  </div>
  <div class="auth-visual register-visual">
    <div class="auth-visual-panel">
      <img src="assets/images/login.svg" alt="Ilustração de cadastro seguro">
    </div>
    <div class="auth-assurance">
      <strong>Cadastro para participação</strong>
      <span>Escolha seu perfil, informe os dados e mantenha as credenciais em segurança.</span>
    </div>
  </div>
</section>
