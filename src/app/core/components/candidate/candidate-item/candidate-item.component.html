<form nz-form [formGroup]="formGroup" [nzLayout]="'vertical'" class="profile-editor-form" novalidate>
  <nz-form-item>
    <div class="avatar-row">
      <div class="image-mask">
        @if (!avatar()) {
          <span nz-icon nzType="user" nzTheme="outline" aria-hidden="true"></span>
        } @else {
          <img [src]="avatar()" alt="">
        }
      </div>
      <input #image type="file" accept=".jpeg,.png,.jpg" (change)="changeFile($event)" hidden>
      <div class="avatar-btns">
        <button nz-button nzType="default" type="button" (click)="image.click()">Nova foto</button>
        <button nz-button nzType="default" [disabled]="!avatar()" type="button" (click)="clearFile()">Remover</button>
      </div>
    </div>
  </nz-form-item>

  <div class="form-grid">
    <nz-form-item>
      <nz-form-label nzRequired nzFor="name">Nome</nz-form-label>
      <nz-form-control nzErrorTip="Nome inválido!">
        <input nz-input id="name" type="text" maxlength="64" placeholder="Digite o nome completo" formControlName="name"/>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label nzRequired nzFor="cell">Celular</nz-form-label>
      <nz-form-control nzErrorTip="Número inválido!">
        <input nz-input id="cell" formControlName="cellphone" maxlength="15" type="text"
          [mask]="'(00) 00000-0000'" placeholder="Ex.: (92) 99999-9999"/>
      </nz-form-control>
    </nz-form-item>
  </div>
  <div *nzModalFooter>
    <button nz-button nzType="default" type="button" (click)="cancel()">Fechar</button>
    <button class="success" nz-button nzType="primary" type="submit"
      (click)="saveOrUpdate()" [disabled]="!formGroup.valid">
      <span nz-icon nzType="check" nzTheme="outline"></span>
      Salvar
    </button>
  </div>
</form>
