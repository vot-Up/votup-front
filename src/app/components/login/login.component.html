<section class="login-page">
    <div class="login-panel">
        <div class="logo">
            <img src="../../../assets/images/logo-votup.svg" height="32" alt="VotUp">
            <span>VotUp</span>
        </div>
        <h1>Bem-vindo de volta</h1>
        <p>Entre com seu email e senha para acessar o painel administrativo.</p>

        <form nz-form class="login-form" [formGroup]="formGroup">
            <nz-form-item>
                <nz-form-control nzErrorTip="Por favor, digite seu email!">
                    <nz-input-group nzPrefixIcon="user">
                        <input type="email" nz-input formControlName="email" placeholder="Email" autocomplete="off"/>
                    </nz-input-group>
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-control nzErrorTip="Por favor, digite sua senha!">
                    <nz-input-group nzPrefixIcon="lock">
                        <input nz-input
                               placeholder="Senha"
                               type="password"
                               [type]="hide() ? 'password': 'text'"
                               formControlName="password"
                               minlength="4"
                               maxlength="64"
                               autocomplete="off"
                               required>
                    </nz-input-group>
                </nz-form-control>
            </nz-form-item>

            <div class="login-link">
                <a nz-button nzType="link" (click)="this.router.navigate(['reset-password']).then();">
                    Esqueceu sua senha?
                </a>
            </div>

            @if (test()) {
                <nz-alert nzType="warning" class="login-alert" nzMessage="Usuario não encontrado" nzShowIcon></nz-alert>
            }

            <button nzBlock nz-button nzType="primary" class="submit-button" (click)="login()" [disabled]="!formGroup.valid">
                Entrar
            </button>
        </form>
    </div>
    <div class="login-visual">
        <img src="assets/images/login.svg" alt="Ilustração de login">
    </div>
</section>
